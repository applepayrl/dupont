<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Analyzer</title>
    <link rel="stylesheet" href="./src/styles.css?v=2" />
  </head>
  <body>
    <main id="app">
      <section class="shell">
        <header class="hero">
          <p class="eyebrow">SEC 10-K ROE analysis</p>
          <h1>Company Analyzer</h1>
          <p class="lede">
            Search a US public company, pull its latest annual filings, and visualize ROE through two DuPont-style decompositions.
          </p>
        </header>

        <section class="search-panel" aria-label="Company search">
          <div class="search-row">
            <label class="search-label" for="company-search">Company or ticker</label>
            <div class="search-box">
              <svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
              </svg>
              <input
                id="company-search"
                type="search"
                autocomplete="off"
                spellcheck="false"
                placeholder="Apple, Microsoft, AAPL..."
                aria-autocomplete="list"
                aria-expanded="false"
                aria-controls="company-results"
              />
              <button id="demo-button" class="icon-button text-action" type="button">Demo</button>
            </div>
          </div>
          <div id="company-results" class="results" role="listbox" hidden></div>
          <p id="search-status" class="status-line" role="status"></p>
        </section>

        <section id="analyzer" class="analyzer" aria-live="polite"></section>
      </section>
    </main>
    <script src="./config.js"></script>
    <script type="module" src="./src/app.js?v=3"></script>
  </body>
</html>
